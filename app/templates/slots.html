{% extends "base.html" %}

{% block content %}

<section class="services">
    <h2>Available Slots</h2>

    <div class="cards">
        {% for slot in slots %}
        <div class="card">
            <div style="font-size:1.6rem;margin-bottom:0.5rem;">🕐</div>
            <h3>{{ slot.slot_time }}</h3>
            <p style="margin-bottom:1.2rem;">Slot available</p>
            <a href="/book/{{ slot.id }}" class="cta-btn" style="font-size:0.85rem;padding:9px 20px;">Book Now</a>
        </div>
        {% endfor %}

        {% if not slots %}
        <div class="card" style="grid-column:1/-1;padding:3rem;">
            <div style="font-size:2.5rem;margin-bottom:1rem;">📭</div>
            <h3>No slots available</h3>
            <p>Check back soon or contact an admin to add new slots.</p>
        </div>
        {% endif %}
    </div>
</section>

{% endblock %}
