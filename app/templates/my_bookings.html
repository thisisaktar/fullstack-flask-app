{% extends "base.html" %}

{% block content %}

<section class="services">
    <h2>My Bookings</h2>

    <div class="cards">
        {% for booking in bookings %}
        <div class="card">
            <div style="font-size:1.6rem;margin-bottom:0.5rem;">✅</div>
            <h3>{{ booking.slot_time }}</h3>
            <p style="margin-bottom:1.2rem;color:var(--success);">Confirmed</p>

            <form method="POST" action="/cancel">
                <input type="hidden" name="slot_id" value="{{ booking.slot_id }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button class="nav-btn" style="background:var(--danger);color:white;border:none;padding:8px 18px;border-radius:7px;cursor:pointer;font-weight:600;">Cancel Booking</button>
            </form>
        </div>
        {% endfor %}

        {% if not bookings %}
        <div class="card" style="grid-column:1/-1;padding:3rem;">
            <div style="font-size:2.5rem;margin-bottom:1rem;">📋</div>
            <h3>No bookings yet</h3>
            <p>Head to <a href="/slots" style="color:var(--amber);">Slots</a> to make your first booking.</p>
        </div>
        {% endif %}
    </div>
</section>

{% endblock %}
