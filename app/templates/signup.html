{% extends "base.html" %}

{% block content %}

<section class="services" style="max-width:460px;">
    <h2>Create Account</h2>
    <p style="text-align:center;color:var(--text-muted);margin-bottom:2rem;font-size:0.9rem;">Join GuideMe and start booking slots instantly</p>

    <div class="card" style="padding:2.2rem;">
        <form id="signupForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email address" required>
            <input type="password" id="password" placeholder="Create a password" required>
            <button type="submit" style="width:100%;padding:13px;">Create Account</button>
        </form>
        <p style="text-align:center;margin-top:1.2rem;font-size:0.85rem;color:var(--text-muted);">
            Already have an account? <a href="/login" style="color:var(--amber);text-decoration:none;font-weight:600;">Sign in</a>
        </p>
    </div>
</section>

<script src="{{ url_for('static', filename='signup.js') }}"></script>

{% endblock %}
