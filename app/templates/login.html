{% extends "base.html" %}

{% block content %}

<section class="services" style="max-width:460px;">
    <h2>Welcome Back</h2>
    <p style="text-align:center;color:var(--text-muted);margin-bottom:2rem;font-size:0.9rem;">Sign in to manage your bookings</p>

    <div class="card" style="padding:2.2rem;">
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" style="width:100%;padding:13px;">Sign In</button>
        </form>
        <p style="text-align:center;margin-top:1.2rem;font-size:0.85rem;color:var(--text-muted);">
            Don't have an account? <a href="/signup" style="color:var(--amber);text-decoration:none;font-weight:600;">Sign up</a>
        </p>
    </div>
</section>

<script src="{{ url_for('static', filename='login.js') }}"></script>

{% endblock %}
